<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <rect width="1200" height="900" fill="#0E100D"/>
  <!-- Texture -->
  <pattern id="g" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <circle cx="30" cy="30" r="1" fill="#8CC968" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="900" fill="url(#g)"/>

  <!-- Section label -->
  <text x="80" y="72" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="13" font-weight="600" fill="#8CC968" letter-spacing="4">BRAND IN USE</text>

  <!-- ── COFFEE CUP MOCKUP (center-left) ── -->
  <g transform="translate(220,460)">
    <!-- Shadow -->
    <ellipse cx="0" cy="210" rx="100" ry="16" fill="#000" opacity="0.4"/>
    <!-- Cup sleeve (forest green) -->
    <path d="M-72 -60 L-80 180 Q-80 200 0 200 Q80 200 80 180 L72 -60 Q68 -80 0 -80 Q-68 -80 -72 -60 Z" fill="#1A3C1A"/>
    <!-- Cup body (cream) -->
    <path d="M-60 -100 L-66 160 Q-66 178 0 178 Q66 178 66 160 L60 -100 Q56 -118 0 -118 Q-56 -118 -60 -100 Z" fill="#F4EFE3"/>
    <!-- Cup top rim -->
    <ellipse cx="0" cy="-118" rx="60" ry="14" fill="#E8DDD0"/>
    <!-- Coffee surface -->
    <ellipse cx="0" cy="-108" rx="56" ry="12" fill="#2A1A0E"/>
    <!-- Foam ring -->
    <circle cx="0" cy="-108" r="32" fill="none" stroke="#D4C9A8" stroke-width="2" opacity="0.5"/>
    <!-- Handle -->
    <path d="M66 -50 Q110 -50 110 0 Q110 50 66 50" stroke="#E8DDD0" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Sleeve logo mark (small, on sleeve) -->
    <g transform="translate(0,60) scale(0.6)">
      <circle cx="0" cy="0" r="36" fill="#0E100D" opacity="0.5"/>
      <rect x="-14" y="3" width="28" height="17" rx="2.5" fill="#F4EFE3"/>
      <rect x="-16" y="0" width="32" height="6" rx="3" fill="#F4EFE3"/>
      <path d="M14 4 Q22 4 22 10 Q22 17 14 15" stroke="#F4EFE3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M0 0 C-6 -7 -7 -16 -4 -23 C-1 -28 0 -30 0 -30 C0 -30 1 -28 4 -23 C7 -16 6 -7 0 0 Z" fill="#8CC968"/>
    </g>
    <!-- TUNAS label on sleeve -->
    <text x="0" y="130" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="12" font-weight="700" fill="#8CC968" text-anchor="middle" letter-spacing="4">TUNAS</text>
  </g>

  <!-- ── BUSINESS CARD (right side, tilted) ── -->
  <g transform="translate(760,320) rotate(-6)">
    <!-- Card shadow -->
    <rect x="4" y="4" width="340" height="200" rx="8" fill="#000" opacity="0.5"/>
    <!-- Card face - front (dark) -->
    <rect x="0" y="0" width="340" height="200" rx="8" fill="#1A3C1A"/>
    <!-- Card logo mark small -->
    <g transform="translate(50,100) scale(0.55)">
      <circle cx="0" cy="0" r="48" fill="#0E100D" opacity="0.5"/>
      <rect x="-19" y="4" width="38" height="23" rx="3.5" fill="#F4EFE3"/>
      <rect x="-22" y="0" width="44" height="7" rx="3.5" fill="#F4EFE3"/>
      <path d="M19 6 Q30 6 30 14 Q30 22 19 20" stroke="#F4EFE3" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M0 0 C-8 -9 -9 -21 -5 -30 C-2 -37 0 -40 0 -40 C0 -40 2 -37 5 -30 C9 -21 8 -9 0 0 Z" fill="#8CC968"/>
    </g>
    <text x="110" y="92" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="20" font-weight="700" fill="#F4EFE3" letter-spacing="4">TUNAS</text>
    <text x="110" y="110" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="9" fill="#8CC968" letter-spacing="3">COFFEE</text>
    <!-- Card details -->
    <text x="30" y="162" font-family="'Courier New', monospace" font-size="9" fill="#F4EFE3" opacity="0.5">hello@tunascoffee.id</text>
    <text x="30" y="178" font-family="'Courier New', monospace" font-size="9" fill="#F4EFE3" opacity="0.5">@tunascoffee</text>
    <!-- Leaf accent corner -->
    <ellipse cx="320" cy="20" rx="10" ry="18" fill="#8CC968" opacity="0.2" transform="rotate(20 320 20)"/>
    <ellipse cx="308" cy="14" rx="7" ry="14" fill="#3A7A30" opacity="0.2" transform="rotate(-10 308 14)"/>
  </g>

  <!-- Back of card below, slightly offset -->
  <g transform="translate(820,500) rotate(-3)">
    <rect x="3" y="3" width="340" height="200" rx="8" fill="#000" opacity="0.35"/>
    <rect x="0" y="0" width="340" height="200" rx="8" fill="#F4EFE3"/>
    <!-- Pattern strip at top -->
    <rect x="0" y="0" width="340" height="6" rx="2" fill="#1A3C1A"/>
    <rect x="0" y="194" width="340" height="6" rx="2" fill="#1A3C1A"/>
    <!-- Leaf motif center -->
    <ellipse cx="170" cy="100" rx="14" ry="24" fill="#8CC968" opacity="0.18" transform="rotate(-20 170 100)"/>
    <ellipse cx="190" cy="96" rx="14" ry="24" fill="#3A7A30" opacity="0.15" transform="rotate(15 190 96)"/>
    <!-- Tagline -->
    <text x="170" y="138" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#1A3C1A" text-anchor="middle" opacity="0.5">Tumbuh dari tanah yang baik.</text>
  </g>

  <!-- ── Paper bag (far right) ── -->
  <g transform="translate(1020,300)">
    <!-- Bag shadow -->
    <ellipse cx="80" cy="530" rx="70" ry="10" fill="#000" opacity="0.3"/>
    <!-- Bag body -->
    <rect x="0" y="40" width="160" height="480" rx="4" fill="#D4C9A8"/>
    <!-- Bag top fold -->
    <rect x="0" y="20" width="160" height="30" rx="2" fill="#C4B898"/>
    <!-- Gusset lines -->
    <line x1="0" y1="40" x2="20" y2="70" stroke="#B8AC8A" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="40" x2="140" y2="70" stroke="#B8AC8A" stroke-width="1" opacity="0.5"/>
    <!-- Rope handles -->
    <path d="M40 20 Q40 -10 80 -14 Q120 -10 120 20" stroke="#1A3C1A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Logo on bag -->
    <g transform="translate(80,240) scale(0.7)">
      <circle cx="0" cy="0" r="48" fill="#1A3C1A"/>
      <circle cx="0" cy="0" r="43" fill="none" stroke="#8CC968" stroke-width=".9" stroke-dasharray="4 2.5" opacity="0.55"/>
      <rect x="-19" y="4" width="38" height="23" rx="3.5" fill="#F4EFE3"/>
      <rect x="-22" y="0" width="44" height="7" rx="3.5" fill="#F4EFE3"/>
      <path d="M19 6 Q30 6 30 14 Q30 22 19 20" stroke="#F4EFE3" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M0 0 C-8 -9 -9 -21 -5 -30 C-2 -37 0 -40 0 -40 C0 -40 2 -37 5 -30 C9 -21 8 -9 0 0 Z" fill="#8CC968"/>
    </g>
    <text x="80" y="316" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="14" font-weight="700" fill="#1A3C1A" text-anchor="middle" letter-spacing="4">TUNAS</text>
    <text x="80" y="332" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="8" fill="#3A7A30" text-anchor="middle" letter-spacing="3">COFFEE</text>
  </g>

  <!-- Bottom label -->
  <text x="80" y="858" font-family="'Courier New', monospace" font-size="11" fill="#8CC968" opacity="0.4" letter-spacing="2">TUNAS COFFEE — BRAND APPLICATION</text>
</svg>
