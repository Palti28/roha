<svg viewBox="0 0 491 423" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustrasi alat desain dan pengembangan web">
  <defs>
    <style>
      .fc-a { animation: float-up 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .fc-b { animation: float-dn 8s ease-in-out 0.6s infinite; transform-box: fill-box; transform-origin: center; }
      .fc-c { animation: float-up 7s ease-in-out 1.2s infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes float-up { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-7px) } }
      @keyframes float-dn { 0%,100% { transform: translateY(0) } 50% { transform: translateY(7px) } }
    </style>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1a1611" flood-opacity="0.07"/>
    </filter>
    <filter id="sh-sm" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#1a1611" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Large background accent circle -->
  <circle cx="230" cy="205" r="175" fill="#c1440e" opacity="0.035"/>

  <!-- ===== MAIN BROWSER WINDOW ===== -->
  <g filter="url(#sh)">
    <rect x="72" y="56" width="278" height="214" rx="12" fill="white" stroke="#e8e2d9" stroke-width="1.5"/>
    <!-- Chrome bar -->
    <rect x="72" y="56" width="278" height="36" rx="12" fill="#f5f2ec"/>
    <rect x="72" y="80" width="278" height="12" fill="#f5f2ec"/>
    <!-- Window dots -->
    <circle cx="92" cy="74" r="5" fill="#e8e2d9"/>
    <circle cx="109" cy="74" r="5" fill="#e8e2d9"/>
    <circle cx="126" cy="74" r="5" fill="#e8e2d9"/>
    <!-- Address bar -->
    <rect x="154" y="64" width="114" height="16" rx="8" fill="white" stroke="#e8e2d9" stroke-width="1"/>
    <circle cx="168" cy="72" r="2.5" fill="#e8e2d9"/>
    <rect x="176" y="70" width="52" height="4" rx="2" fill="#e8e2d9" opacity="0.6"/>
    <!-- Chrome divider -->
    <line x1="72" y1="92" x2="350" y2="92" stroke="#e8e2d9" stroke-width="1"/>

    <!-- Nav -->
    <rect x="90" y="105" width="30" height="6" rx="3" fill="#1a1611" opacity="0.75"/>
    <rect x="219" y="105" width="22" height="6" rx="3" fill="#1a1611" opacity="0.16"/>
    <rect x="251" y="105" width="22" height="6" rx="3" fill="#1a1611" opacity="0.16"/>
    <rect x="283" y="105" width="22" height="6" rx="3" fill="#1a1611" opacity="0.16"/>
    <rect x="316" y="101" width="24" height="14" rx="7" fill="#c1440e"/>

    <!-- Headline blocks -->
    <rect x="90" y="126" width="152" height="11" rx="4" fill="#1a1611" opacity="0.82"/>
    <rect x="90" y="143" width="170" height="11" rx="4" fill="#1a1611" opacity="0.82"/>
    <rect x="90" y="160" width="116" height="11" rx="4" fill="#c1440e" opacity="0.85"/>

    <!-- Sub-copy -->
    <rect x="90" y="180" width="152" height="5" rx="2.5" fill="#1a1611" opacity="0.12"/>
    <rect x="90" y="191" width="134" height="5" rx="2.5" fill="#1a1611" opacity="0.12"/>
    <rect x="90" y="202" width="104" height="5" rx="2.5" fill="#1a1611" opacity="0.08"/>

    <!-- CTA buttons -->
    <rect x="90" y="220" width="78" height="20" rx="10" fill="#1a1611"/>
    <rect x="176" y="220" width="70" height="20" rx="10" stroke="#e8e2d9" stroke-width="1.5"/>

    <!-- Right image zone -->
    <rect x="258" y="114" width="80" height="104" rx="8" fill="#f5f2ec" stroke="#e8e2d9" stroke-width="1"/>
    <circle cx="298" cy="150" r="18" fill="#e8e2d9" opacity="0.5"/>
    <rect x="272" y="176" width="52" height="5" rx="2.5" fill="#e8e2d9" opacity="0.65"/>
    <rect x="278" y="187" width="40" height="5" rx="2.5" fill="#e8e2d9" opacity="0.4"/>
    <rect x="272" y="198" width="36" height="10" rx="5" fill="#c1440e" opacity="0.22"/>
  </g>

  <!-- ===== CARD A — Color Tokens (top-right, floats up) ===== -->
  <g class="fc-a" filter="url(#sh-sm)">
    <rect x="358" y="46" width="116" height="84" rx="10" fill="white" stroke="#e8e2d9" stroke-width="1.5"/>
    <rect x="370" y="60" width="58" height="4" rx="2" fill="#1a1611" opacity="0.18"/>
    <rect x="370" y="70" width="20" height="20" rx="4" fill="#1a1611"/>
    <rect x="395" y="70" width="20" height="20" rx="4" fill="#c1440e"/>
    <rect x="420" y="70" width="20" height="20" rx="4" fill="#f6efe0" stroke="#e8e2d9" stroke-width="1"/>
    <rect x="445" y="70" width="20" height="20" rx="4" fill="#e8845a"/>
    <rect x="370" y="96" width="92" height="4" rx="2" fill="#e8e2d9" opacity="0.5"/>
    <rect x="370" y="106" width="64" height="4" rx="2" fill="#e8e2d9" opacity="0.3"/>
  </g>

  <!-- ===== CARD B — Progress (bottom-right, floats down) ===== -->
  <g class="fc-b" filter="url(#sh-sm)">
    <rect x="358" y="198" width="116" height="96" rx="10" fill="white" stroke="#e8e2d9" stroke-width="1.5"/>
    <rect x="370" y="212" width="52" height="4" rx="2" fill="#1a1611" opacity="0.18"/>
    <rect x="370" y="224" width="22" height="8" rx="3" fill="#1a1611" opacity="0.75"/>
    <rect x="398" y="226" width="38" height="5" rx="2.5" fill="#e8e2d9" opacity="0.45"/>
    <rect x="370" y="240" width="92" height="5" rx="2.5" fill="#f5f2ec"/>
    <rect x="370" y="240" width="62" height="5" rx="2.5" fill="#c1440e" opacity="0.7"/>
    <rect x="370" y="253" width="18" height="8" rx="3" fill="#1a1611" opacity="0.55"/>
    <rect x="394" y="255" width="48" height="5" rx="2.5" fill="#e8e2d9" opacity="0.45"/>
    <rect x="370" y="269" width="92" height="5" rx="2.5" fill="#f5f2ec"/>
    <rect x="370" y="269" width="44" height="5" rx="2.5" fill="#1a1611" opacity="0.28"/>
    <circle cx="454" cy="282" r="6" fill="#c1440e" opacity="0.15"/>
  </g>

  <!-- ===== CARD C — Components (bottom-left, floats up) ===== -->
  <g class="fc-c" filter="url(#sh-sm)">
    <rect x="32" y="285" width="118" height="84" rx="10" fill="white" stroke="#e8e2d9" stroke-width="1.5"/>
    <rect x="44" y="299" width="55" height="4" rx="2" fill="#1a1611" opacity="0.18"/>
    <rect x="44" y="311" width="54" height="18" rx="9" fill="#1a1611"/>
    <rect x="104" y="311" width="34" height="18" rx="9" stroke="#e8e2d9" stroke-width="1.5"/>
    <rect x="44" y="338" width="94" height="18" rx="5" fill="#f5f2ec" stroke="#e8e2d9" stroke-width="1"/>
    <rect x="52" y="344" width="36" height="5" rx="2.5" fill="#e8e2d9" opacity="0.6"/>
    <rect x="110" y="341" width="20" height="12" rx="4" fill="#c1440e" opacity="0.2"/>
    <rect x="114" y="345" width="12" height="4" rx="2" fill="#c1440e" opacity="0.5"/>
  </g>

  <!-- ===== DECORATIVE ===== -->

  <!-- Dot cluster: top-left -->
  <circle cx="44" cy="68" r="4" fill="#c1440e" opacity="0.4"/>
  <circle cx="57" cy="68" r="4" fill="#c1440e" opacity="0.2"/>
  <circle cx="44" cy="81" r="4" fill="#c1440e" opacity="0.13"/>
  <circle cx="57" cy="81" r="4" fill="#c1440e" opacity="0.07"/>

  <!-- Dot cluster: bottom-right -->
  <circle cx="434" cy="370" r="4" fill="#c1440e" opacity="0.36"/>
  <circle cx="449" cy="370" r="4" fill="#c1440e" opacity="0.2"/>
  <circle cx="464" cy="370" r="4" fill="#c1440e" opacity="0.1"/>
  <circle cx="434" cy="385" r="4" fill="#c1440e" opacity="0.16"/>
  <circle cx="449" cy="385" r="4" fill="#c1440e" opacity="0.08"/>

  <!-- Dashed arc line (bottom) -->
  <path d="M 32 408 Q 252 372 472 408" stroke="#e8e2d9" stroke-width="1.5" fill="none" stroke-dasharray="4 6"/>

  <!-- Cursor (decorative, right edge of browser) -->
  <g opacity="0.55">
    <path d="M 350 170 L 350 186 L 353.5 181.5 L 356.5 188 L 358.5 187 L 355.5 180.5 L 361 180.5 Z" fill="#1a1611"/>
  </g>
</svg>
