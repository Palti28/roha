<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <rect width="1200" height="900" fill="#0E100D"/>

  <!-- Title -->
  <text x="80" y="88" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="13" font-weight="600" fill="#8CC968" letter-spacing="4">COLOUR SYSTEM</text>
  <text x="80" y="128" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="38" font-weight="700" fill="#F4EFE3" letter-spacing="-1">Tunas Coffee Palette</text>
  <rect x="80" y="148" width="56" height="2" fill="#3A7A30"/>

  <!-- Swatch grid: 3 cols × 2 rows -->
  <!-- Row 1 -->

  <!-- Forest -->
  <rect x="80" y="200" width="320" height="280" rx="12" fill="#1A3C1A"/>
  <text x="104" y="374" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="15" font-weight="700" fill="#8CC968" letter-spacing="2">FOREST</text>
  <text x="104" y="396" font-family="'Courier New', monospace" font-size="13" fill="#F4EFE3" opacity="0.5">#1A3C1A</text>
  <text x="104" y="415" font-family="'Courier New', monospace" font-size="11" fill="#F4EFE3" opacity="0.3">Primary Green</text>

  <!-- Grove -->
  <rect x="440" y="200" width="320" height="280" rx="12" fill="#3A7A30"/>
  <text x="464" y="374" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="15" font-weight="700" fill="#F4EFE3" letter-spacing="2">GROVE</text>
  <text x="464" y="396" font-family="'Courier New', monospace" font-size="13" fill="#F4EFE3" opacity="0.5">#3A7A30</text>
  <text x="464" y="415" font-family="'Courier New', monospace" font-size="11" fill="#F4EFE3" opacity="0.3">Mid Green</text>

  <!-- Leaf -->
  <rect x="800" y="200" width="320" height="280" rx="12" fill="#8CC968"/>
  <text x="824" y="374" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="15" font-weight="700" fill="#0E100D" letter-spacing="2">LEAF</text>
  <text x="824" y="396" font-family="'Courier New', monospace" font-size="13" fill="#0E100D" opacity="0.55">#8CC968</text>
  <text x="824" y="415" font-family="'Courier New', monospace" font-size="11" fill="#0E100D" opacity="0.4">Accent Green</text>

  <!-- Row 2 -->

  <!-- Cream -->
  <rect x="80" y="520" width="320" height="280" rx="12" fill="#F4EFE3"/>
  <text x="104" y="694" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="15" font-weight="700" fill="#1A3C1A" letter-spacing="2">CREAM</text>
  <text x="104" y="716" font-family="'Courier New', monospace" font-size="13" fill="#1A3C1A" opacity="0.55">#F4EFE3</text>
  <text x="104" y="735" font-family="'Courier New', monospace" font-size="11" fill="#1A3C1A" opacity="0.4">Light Background</text>

  <!-- Sand -->
  <rect x="440" y="520" width="320" height="280" rx="12" fill="#D4C9A8"/>
  <text x="464" y="694" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="15" font-weight="700" fill="#1A3C1A" letter-spacing="2">SAND</text>
  <text x="464" y="716" font-family="'Courier New', monospace" font-size="13" fill="#1A3C1A" opacity="0.55">#D4C9A8</text>
  <text x="464" y="735" font-family="'Courier New', monospace" font-size="11" fill="#1A3C1A" opacity="0.4">Neutral Warm</text>

  <!-- Espresso -->
  <rect x="800" y="520" width="320" height="280" rx="12" fill="#0E100D"/>
  <rect x="800" y="520" width="320" height="280" rx="12" fill="none" stroke="#2a2a28" stroke-width="1"/>
  <text x="824" y="694" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="15" font-weight="700" fill="#8CC968" letter-spacing="2">ESPRESSO</text>
  <text x="824" y="716" font-family="'Courier New', monospace" font-size="13" fill="#F4EFE3" opacity="0.5">#0E100D</text>
  <text x="824" y="735" font-family="'Courier New', monospace" font-size="11" fill="#F4EFE3" opacity="0.3">Near Black</text>
</svg>
