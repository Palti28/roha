<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <rect width="1200" height="900" fill="#F4EFE3"/>

  <!-- Title -->
  <text x="80" y="72" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="13" font-weight="600" fill="#3A7A30" letter-spacing="4">LOGO SYSTEM</text>
  <text x="80" y="108" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="36" font-weight="700" fill="#1A3C1A" letter-spacing="-1">Three variations, one mark.</text>
  <rect x="80" y="124" width="48" height="2" fill="#8CC968"/>

  <!-- ── VARIATION 1: Primary (mark + wordmark stacked) - on cream ── -->
  <rect x="80" y="164" width="320" height="360" rx="10" fill="#FFFFFF" stroke="#E8E0CC" stroke-width="1"/>
  <!-- Mark -->
  <g transform="translate(240,280) scale(1.4)">
    <circle cx="0" cy="0" r="48" fill="#1A3C1A"/>
    <circle cx="0" cy="0" r="43" fill="none" stroke="#8CC968" stroke-width=".9" stroke-dasharray="4 2.5" opacity="0.55"/>
    <rect x="-26" y="27" width="52" height="4" rx="2" fill="#F4EFE3" opacity="0.45"/>
    <rect x="-19" y="4" width="38" height="23" rx="3.5" fill="#F4EFE3"/>
    <rect x="-22" y="0" width="44" height="7" rx="3.5" fill="#F4EFE3"/>
    <path d="M19 6 Q30 6 30 14 Q30 22 19 20" stroke="#F4EFE3" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="0" cy="17" rx="13" ry="3.5" fill="#1A3C1A" opacity="0.3"/>
    <path d="M0 0 C-8 -9 -9 -21 -5 -30 C-2 -37 0 -40 0 -40 C0 -40 2 -37 5 -30 C9 -21 8 -9 0 0 Z" fill="#8CC968"/>
    <line x1="0" y1="-40" x2="0" y2="0" stroke="#1A3C1A" stroke-width="1" opacity="0.35"/>
  </g>
  <!-- Wordmark -->
  <text x="240" y="400" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="22" font-weight="700" fill="#1A3C1A" text-anchor="middle" letter-spacing="6">TUNAS</text>
  <text x="240" y="420" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="10" fill="#3A7A30" text-anchor="middle" letter-spacing="4" opacity="0.6">COFFEE</text>
  <!-- Label -->
  <text x="240" y="505" font-family="'Courier New', monospace" font-size="10" fill="#1A3C1A" text-anchor="middle" opacity="0.4" letter-spacing="2">PRIMARY · STACKED</text>

  <!-- ── VARIATION 2: Horizontal - on dark ── -->
  <rect x="440" y="164" width="320" height="360" rx="10" fill="#1A3C1A"/>
  <!-- Mark small -->
  <g transform="translate(500,344) scale(0.9)">
    <circle cx="0" cy="0" r="48" fill="#0E100D" opacity="0.5"/>
    <rect x="-19" y="4" width="38" height="23" rx="3.5" fill="#F4EFE3"/>
    <rect x="-22" y="0" width="44" height="7" rx="3.5" fill="#F4EFE3"/>
    <path d="M19 6 Q30 6 30 14 Q30 22 19 20" stroke="#F4EFE3" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M0 0 C-8 -9 -9 -21 -5 -30 C-2 -37 0 -40 0 -40 C0 -40 2 -37 5 -30 C9 -21 8 -9 0 0 Z" fill="#8CC968"/>
  </g>
  <!-- Wordmark right -->
  <text x="610" y="332" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="28" font-weight="700" fill="#F4EFE3" text-anchor="middle" letter-spacing="5">TUNAS</text>
  <text x="610" y="356" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="11" fill="#8CC968" text-anchor="middle" letter-spacing="4">COFFEE</text>
  <text x="600" y="505" font-family="'Courier New', monospace" font-size="10" fill="#8CC968" text-anchor="middle" opacity="0.55" letter-spacing="2">REVERSED · DARK BG</text>

  <!-- ── VARIATION 3: Icon only - on leaf green ── -->
  <rect x="800" y="164" width="320" height="360" rx="10" fill="#8CC968"/>
  <g transform="translate(960,344) scale(1.5)">
    <circle cx="0" cy="0" r="48" fill="#1A3C1A"/>
    <circle cx="0" cy="0" r="43" fill="none" stroke="#F4EFE3" stroke-width=".8" stroke-dasharray="4 2.5" opacity="0.3"/>
    <rect x="-19" y="4" width="38" height="23" rx="3.5" fill="#F4EFE3"/>
    <rect x="-22" y="0" width="44" height="7" rx="3.5" fill="#F4EFE3"/>
    <path d="M19 6 Q30 6 30 14 Q30 22 19 20" stroke="#F4EFE3" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M0 0 C-8 -9 -9 -21 -5 -30 C-2 -37 0 -40 0 -40 C0 -40 2 -37 5 -30 C9 -21 8 -9 0 0 Z" fill="#F4EFE3"/>
  </g>
  <text x="960" y="505" font-family="'Courier New', monospace" font-size="10" fill="#1A3C1A" text-anchor="middle" opacity="0.55" letter-spacing="2">ICON ONLY · ACCENT BG</text>

  <!-- ── TYPOGRAPHY SPECIMEN ── -->
  <rect x="80" y="560" width="1040" height="280" rx="10" fill="#1A3C1A"/>
  <text x="116" y="606" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="11" letter-spacing="3" fill="#8CC968" opacity="0.7">TYPOGRAPHY</text>
  <text x="116" y="660" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="52" font-weight="700" fill="#F4EFE3" letter-spacing="-1">Tumbuh dari</text>
  <text x="116" y="716" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="52" font-weight="700" fill="#8CC968" letter-spacing="-1">tanah yang baik.</text>
  <text x="116" y="760" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#F4EFE3" opacity="0.5">Display / Headline · Syne 700 · Letter-spacing -0.03em</text>
  <!-- Divider -->
  <rect x="700" y="580" width="1" height="220" fill="#3A7A30" opacity="0.5"/>
  <!-- Body type sample -->
  <text x="730" y="620" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="11" letter-spacing="3" fill="#8CC968" opacity="0.7">BODY TEXT</text>
  <text x="730" y="660" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="16" fill="#F4EFE3" opacity="0.8">Aa Bb Cc Dd Ee Ff</text>
  <text x="730" y="690" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="16" fill="#F4EFE3" opacity="0.8">Gg Hh Ii Jj Kk Ll</text>
  <text x="730" y="730" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="13" fill="#F4EFE3" opacity="0.45">Plus Jakarta Sans · Regular 400</text>
  <text x="730" y="768" font-family="'Courier New', monospace" font-size="12" fill="#8CC968" letter-spacing="2">MONO · GEIST MONO 600</text>
</svg>
